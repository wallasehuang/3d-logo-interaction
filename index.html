<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Logo M — Three.js Interactive Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="info-overlay">
      <h1>3D Logo M — Three.js Interactive Demo</h1>
    </div>

    <div class="performance-monitor">
      <span class="fps-label">System Performance</span>
      <span class="fps-value" id="fps-counter">60</span>
      <span style="font-size: 0.8rem">FPS</span>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.162.0/three.module.min.js"
        }
      }
    </script>

    <script type="module" src="main.js"></script>
  </body>
</html>
